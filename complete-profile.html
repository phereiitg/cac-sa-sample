<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Complete Your Profile — Summer Analytics 2025</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-client.js"></script>
<script src="js/auth.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--bg:#0b0f1a;--surface:#111827;--surface2:#1a2235;--border:#1e2d40;--accent:#00d4aa;--text:#e2e8f0;--muted:#64748b;--danger:#f87171;}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:2.5rem;width:100%;max-width:520px;box-shadow:0 25px 60px rgba(0,0,0,0.4);}
.logo-row{display:flex;align-items:center;gap:0.75rem;margin-bottom:2rem;}
.logo-box{width:38px;height:38px;background:var(--accent);border-radius:10px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:0.82rem;color:#0b0f1a;flex-shrink:0;}
.logo-text{font-size:0.85rem;font-weight:600;line-height:1.3;}
.logo-sub{font-size:0.7rem;color:var(--muted);}
h2{font-size:1.4rem;font-weight:700;margin-bottom:0.4rem;}
.sub{color:var(--muted);font-size:0.88rem;margin-bottom:2rem;}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem;}
.full{grid-column:1/-1;}
label{display:block;font-size:0.78rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:0.4rem;}
input,select{
  width:100%;background:var(--bg);border:1px solid var(--border);border-radius:10px;
  padding:0.7rem 0.9rem;color:var(--text);font-family:'Outfit',sans-serif;font-size:0.9rem;
  outline:none;transition:border-color 0.15s;
}
input:focus,select:focus{border-color:var(--accent);}
select option{background:var(--surface);}
.btn{width:100%;padding:0.85rem;background:var(--accent);color:#0b0f1a;border:none;border-radius:12px;font-family:'Outfit',sans-serif;font-size:0.95rem;font-weight:700;cursor:pointer;margin-top:1.5rem;transition:opacity 0.15s;}
.btn:hover{opacity:0.9;}
.btn:disabled{opacity:0.4;pointer-events:none;}
.err{color:var(--danger);font-size:0.82rem;margin-top:0.75rem;display:none;}
</style>
</head>
<body>
<div class="card">
  <div class="logo-row">
    <div class="logo-box">C/\A</div>
    <div><div class="logo-text">Consulting &amp; Analytics Club</div><div class="logo-sub">IIT Guwahati</div></div>
  </div>
  <h2>Complete Your Profile</h2>
  <p class="sub">This is a one-time setup. Your information is used for the course certificate and leaderboard.</p>

  <div class="grid">
    <div class="full">
      <label>Full Name *</label>
      <input type="text" id="fullName" placeholder="As per ID card" required>
    </div>
    <div class="full">
      <label>College / Institute *</label>
      <input type="text" id="college" placeholder="IIT Guwahati / other" required>
    </div>
    <div>
      <label>Year of Study *</label>
      <select id="year" required>
        <option value="">Select</option>
        <option>1st Year</option>
        <option>2nd Year</option>
        <option>3rd Year</option>
        <option>4th Year</option>
        <option>5th Year</option>
        <option>Postgraduate</option>
        <option>Alumni</option>
      </select>
    </div>
    <div>
      <label>Branch / Major *</label>
      <input type="text" id="branch" placeholder="e.g. CSE, EEE, ECE…" required>
    </div>
    <div>
      <label>Phone Number</label>
      <input type="tel" id="phone" placeholder="+91 xxxxxxxxxx">
    </div>
    <div>
      <label>Roll Number <span style="color:var(--muted);font-weight:400;">(optional)</span></label>
      <input type="text" id="roll" placeholder="IITG roll (if applicable)">
    </div>
  </div>

  <p class="err" id="errMsg"></p>
  <button class="btn" id="saveBtn" onclick="saveProfile()">Save &amp; Continue →</button>
</div>

<script>
let currentUser = null;

(async () => {
  const session = await requireAuth();
  if (!session) return;
  currentUser = session.user;

  // If profile already complete, go to dashboard
  const p = await getProfile(currentUser.id);
  if (p && p.full_name) { window.location.href = "/dashboard.html"; return; }

  // Pre-fill email display
  document.getElementById("fullName").placeholder = currentUser.user_metadata?.full_name || "Your full name";
})();

async function saveProfile() {
  const btn = document.getElementById("saveBtn");
  const err = document.getElementById("errMsg");
  err.style.display = "none";

  const fullName = document.getElementById("fullName").value.trim();
  const college  = document.getElementById("college").value.trim();
  const year     = document.getElementById("year").value;
  const branch   = document.getElementById("branch").value.trim();
  const phone    = document.getElementById("phone").value.trim();
  const roll     = document.getElementById("roll").value.trim();

  if (!fullName || !college || !year || !branch) {
    err.textContent = "Please fill all required fields.";
    err.style.display = "block";
    return;
  }

  btn.disabled = true;
  btn.textContent = "Saving…";

  const { error } = await supabaseClient.from("profiles").upsert({
    id: currentUser.id,
    email: currentUser.email,
    full_name: fullName,
    college,
    year_of_study: year,
    branch,
    phone: phone || null,
    roll_number: roll || null,
  });

  if (error) {
    err.textContent = "Error saving profile: " + error.message;
    err.style.display = "block";
    btn.disabled = false;
    btn.textContent = "Save & Continue →";
    return;
  }

  window.location.href = "/dashboard.html";
}
</script>
</body>
</html>
