<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Signing in… — Summer Analytics 2025</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-client.js"></script>
<style>
body{font-family:sans-serif;background:#0b0f1a;color:#e2e8f0;display:flex;align-items:center;justify-content:center;height:100vh;margin:0;flex-direction:column;gap:1rem;}
.spinner{width:36px;height:36px;border:3px solid #1e2d40;border-top-color:#00d4aa;border-radius:50%;animation:spin 0.7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
p{color:#64748b;font-size:0.9rem;}
</style>
</head>
<body>
<div class="spinner"></div>
<p>Completing sign-in…</p>
<script>
(async () => {
  // Supabase handles the OAuth fragment automatically
  const { data: { session }, error } = await supabaseClient.auth.getSession();

  if (error || !session) {
    // Wait a moment for session exchange
    await new Promise(r => setTimeout(r, 1500));
    const { data: { session: s2 } } = await supabaseClient.auth.getSession();
    if (!s2) { window.location.href = "/index.html"; return; }
  }

  const finalSession = (await supabaseClient.auth.getSession()).data.session;
  if (!finalSession) { window.location.href = "/index.html"; return; }

  // Check if profile exists
  const { data: profile } = await supabaseClient
    .from("profiles").select("id").eq("id", finalSession.user.id).maybeSingle();

  window.location.href = profile ? "/dashboard.html" : "/complete-profile.html";
})();
</script>
</body>
</html>
